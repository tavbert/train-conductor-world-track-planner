<!DOCTYPE html>

    .desert { background-color: rgb(151, 116, 73); }
    .deepdesert { background-color: rgb(195, 149, 50); }

    #grimsby, #hamburg, #rotterdam, #stuttgart, #dijon, #bucharest, #marseille {
      background-color: gray;
      border: 2px solid #111;
      width: 14px;
      height: 14px;
    }

    #belfast { background-color: #4c2f1f; }
    #copenhagen { background-color: #bb6339; }
    #amsterdam { background-color: #4e368e; }
    #london { background-color: #9d6abb; }
    #berlin { background-color: #87263b; }
    #bruges { background-color: #cb494c; }
    #cologne { background-color: #235720; }
    #warsaw { background-color: #415388; }

    #bastei { background-color: #693351; }
    #paris { background-color: #c96e9b; }
    #prague { background-color: #465e07; }
    #budapest { background-color: #696256; }
    #matterhorn { background-color: #383833; }
    #lyon { background-color: #774e29; }
    #bernina { background-color: #a6171b; }
    #millau { background-color: #005865; }
    #verdon { background-color: #40af59; }
    #mostar { background-color: #00b6c1; }

    #madrid { background-color: #753b8c; }

    #cappadocia { background-color: #966126; }
    #meteora { background-color: blue; }
    #damascus { background-color: #0c410f; }
    #trondheim { background-color: #2e0849; }

    .tile { width: 16px; height: 16px; border: 1px solid #666; cursor: grab; }

    .cell {
      width: 16px;
      height: 16px;
      border: 1px solid #999;
      color: #fff;
      font-size: 9px;
      font-weight: bold;
      align-items: center;
      display: flex;
      justify-content: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(61, 16px);
      grid-template-rows: repeat(66, 16px);
      gap: 1px;
    }

    .counttile { width: 16px; height: 16px; border: 1px solid #666; }

    body { margin: 0; height: 100vh; gap: 3px; font-family: sans-serif; }

    .cell img { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }

    .tiles { display: flex; gap: 10px; justify-content: center; }

    .button-bar { display: flex; gap: 8px; padding: 4px; }
    .button-bar button {
      padding: 6px 12px;
      border: 1px solid #888;
      background: #f0f0f0;
      border-radius: 6px;
      cursor: pointer;
    }

    .side-list { padding: 10px; display: flex; flex-direction: column; gap: 12px; }
    .countrow { display: flex; align-items: center; gap: 10px; }
    .main-picture { padding: 10px; align-items: center; justify-content: center; background: #fafafa; overflow: hidden; position: relative; }
    .grid-viewport { overflow: hidden; width: 100%; height: calc(100vh - 20px); position: relative; cursor: grab; }
    .grid-viewport.panning { cursor: grabbing; }
    .grid-viewport .grid { transform-origin: 0 0; }
    .bottom-buttons { display: flex; justify-content: center; gap: 10px; }
    table { width: 100%; border-collapse: collapse; border: 0; }
    .tilechoice { background: #ccc; }
  </style>
</head>

  w: "water", W: "darkwater", g: "grass", G: "darkgrass",
  f: "forest", F: "fallforest", m: "mountain", M: "tallmountain",
  s: "swamp", c: "cloud", "-": "cloud", d: "desert", D: "deepdesert"
};

const COLS = 61, ROWS = 66;

// Terrain texture generation
const TERRAIN_COLORS = {
  grass:        { base: [102, 152, 86],  noise: 18, detail: "speckle" },
  darkgrass:    { base: [92, 141, 93],   noise: 14, detail: "speckle" },
  forest:       { base: [111, 114, 35],  noise: 12, detail: "trees" },
  fallforest:   { base: [134, 118, 19],  noise: 14, detail: "trees" },
  mountain:     { base: [131, 133, 121], noise: 22, detail: "rocky" },
  tallmountain: { base: [107, 118, 122], noise: 20, detail: "rocky" },
  water:        { base: [61, 93, 113],   noise: 10, detail: "waves" },
  darkwater:    { base: [51, 74, 90],    noise: 8,  detail: "waves" },
  swamp:        { base: [53, 69, 38],    noise: 12, detail: "swamp" },
  cloud:        { base: [229, 229, 237], noise: 5,  detail: "wispy" },
  desert:       { base: [151, 116, 73],  noise: 14, detail: "sand" },
  deepdesert:   { base: [195, 149, 50],  noise: 16, detail: "sand" }
};

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

function generateTerrainTile(terrain, seed) {
  const config = TERRAIN_COLORS[terrain];
  if (!config) return null;

  const canvas = document.createElement("canvas");
  canvas.width = 16;
  canvas.height = 16;
  const ctx = canvas.getContext("2d");
  const rng = seededRandom(seed);
  const [br, bg, bb] = config.base;
  const n = config.noise;

  const imageData = ctx.createImageData(16, 16);
  const d = imageData.data;

  // Base noise fill
  for (let i = 0; i < 256; i++) {
    const idx = i * 4;
    const nr = (rng() - 0.5) * n * 2;
    const ng = (rng() - 0.5) * n * 2;
    const nb = (rng() - 0.5) * n * 2;
    d[idx]     = Math.max(0, Math.min(255, br + nr));
    d[idx + 1] = Math.max(0, Math.min(255, bg + ng));
    d[idx + 2] = Math.max(0, Math.min(255, bb + nb));
    d[idx + 3] = 255;
  }

  ctx.putImageData(imageData, 0, 0);

  // Detail overlays
  if (config.detail === "trees") {
    const count = 2 + Math.floor(rng() * 3);
    for (let t = 0; t < count; t++) {
      const tx = 2 + Math.floor(rng() * 12);
      const ty = 2 + Math.floor(rng() * 12);
      const r = 1.5 + rng() * 1.5;
      ctx.beginPath();
      ctx.arc(tx, ty, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${br * 0.6 | 0}, ${bg * 0.6 | 0}, ${bb * 0.6 | 0}, 0.5)`;
      ctx.fill();
      // Highlight dot
      ctx.beginPath();
      ctx.arc(tx - 0.5, ty - 0.5, 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${Math.min(255, br + 40)}, ${Math.min(255, bg + 40)}, ${Math.min(255, bb + 20)}, 0.4)`;
      ctx.fill();
    }
  } else if (config.detail === "rocky") {
    const count = 3 + Math.floor(rng() * 3);
    for (let t = 0; t < count; t++) {
      const rx = Math.floor(rng() * 14);
      const ry = Math.floor(rng() * 14);
      const bright = rng() > 0.5;
      ctx.fillStyle = bright
        ? `rgba(255, 255, 255, ${0.1 + rng() * 0.15})`
        : `rgba(0, 0, 0, ${0.1 + rng() * 0.15})`;
      ctx.fillRect(rx, ry, 1 + Math.floor(rng() * 2), 1 + Math.floor(rng() * 2));
    }
  } else if (config.detail === "waves") {
    for (let wy = 0; wy < 16; wy += 3 + Math.floor(rng() * 3)) {
      ctx.beginPath();
      ctx.moveTo(0, wy);
      for (let wx = 0; wx <= 16; wx += 4) {
        ctx.quadraticCurveTo(wx + 2, wy + (rng() - 0.5) * 2.5, wx + 4, wy);
      }
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.08 + rng() * 0.1})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  } else if (config.detail === "sand") {
    const dots = 8 + Math.floor(rng() * 10);
    for (let t = 0; t < dots; t++) {
      const sx = Math.floor(rng() * 16);
      const sy = Math.floor(rng() * 16);
      ctx.fillStyle = `rgba(0, 0, 0, ${0.05 + rng() * 0.1})`;
      ctx.fillRect(sx, sy, 1, 1);
    }
  } else if (config.detail === "swamp") {
    const count = 2 + Math.floor(rng() * 3);
    for (let t = 0; t < count; t++) {
      const sx = 2 + Math.floor(rng() * 12);
      const sy = 2 + Math.floor(rng() * 12);
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + rng(), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(20, 30, 10, ${0.2 + rng() * 0.2})`;
      ctx.fill();
    }
  } else if (config.detail === "wispy") {
    ctx.fillStyle = `rgba(200, 200, 215, ${0.1 + rng() * 0.1})`;
    const cx = 4 + Math.floor(rng() * 8);
    const cy = 4 + Math.floor(rng() * 8);
    ctx.beginPath();
    ctx.ellipse(cx, cy, 3 + rng() * 3, 1.5 + rng() * 2, rng() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }

  return canvas.toDataURL();
}

// Build city lookup by position
const cityByPos = {};
for (const [id, data] of Object.entries(CITIES)) {
  cityByPos[`${data.x}_${data.y}`] = { id, ...data };
}

// Generate grid
function generateGrid() {
  const grid = document.getElementById("grid");
  // Pre-generate terrain texture cache (keyed by terrain+seed for reuse)
  const textureCache = {};

  for (let y = 1; y <= ROWS; y++) {
    const rowData = GRID_DATA[y - 1];
    for (let x = 1; x <= COLS; x++) {
      const cell = document.createElement("div");
      const posKey = `${x}_${y}`;
      const city = cityByPos[posKey];
      const terrain = TERRAIN_MAP[rowData[x - 1]] || "water";

      // Generate unique terrain texture for this cell
      const seed = x * 7919 + y * 104729;
      const cacheKey = terrain + "_" + (seed % 97); // 97 variants per terrain
      if (!textureCache[cacheKey]) {
        textureCache[cacheKey] = generateTerrainTile(terrain, seed);
      }
      const tex = textureCache[cacheKey];

      if (city) {
        cell.id = city.id;
        cell.className = city.nodrop ? "cell nodrop" : "cell " + terrain;
        cell.textContent = city.label;
        if (!city.nodrop) {
          cell.ondrop = drop;
          cell.ondragover = allowDrop;
        }
      } else {
        cell.id = `cell_${x}_${y}`;
        if (terrain === "cloud") {
          cell.className = "cell cloud nodrop";
        } else {
          cell.className = "cell " + terrain;
          cell.ondrop = drop;
          cell.ondragover = allowDrop;
        }
      }

      // Apply terrain texture as background image (skip cities - they use CSS background-color)
      if (tex && !city) {
        cell.style.backgroundImage = `url(${tex})`;
        cell.style.backgroundSize = "16px 16px";
      }

      grid.appendChild(cell);
    }
  }
}

// Drag & Drop
function allowDrop(ev) { ev.preventDefault(); }

function drag(ev) {
  const target = ev.target;
  if (target.dataset.tile) {
    ev.dataTransfer.setData("tileSrc", target.src);
    ev.dataTransfer.setData("tileId", target.dataset.tile);
  } else {
    ev.dataTransfer.setData("tileSrc", target.src);
    ev.dataTransfer.setData("tileId", target.parentElement.dataset.tileId);
    ev.dataTransfer.setData("originalId", target.id);
  }
}

function drop(ev) {
  ev.preventDefault();
  const src = ev.dataTransfer.getData("tileSrc");
  const id = ev.dataTransfer.getData("tileId");
  const originalId = ev.dataTransfer.getData("originalId");
  const originalTile = document.getElementById(originalId);

  let targetCell = ev.target.classList.contains("cell") ? ev.target : ev.target.parentElement;
  if (!targetCell.classList.contains("cell")) return;

  if (originalTile) {
    delete originalTile.parentElement.dataset.tileId;
    originalTile.remove();
  }

  placeTile(targetCell, src, id, targetCell.firstChild);
}

function placeTile(cell, src, tileId, existing) {
  if (existing) existing.remove();

  const newTile = document.createElement("img");
  newTile.src = src;
  newTile.draggable = true;
  newTile.id = cell.id + "_t";
  newTile.addEventListener("contextmenu", e => {
    e.preventDefault();
    if (cell.firstChild) cell.firstChild.remove();
    delete cell.dataset.tileId;
    countTrack();
  });
  newTile.addEventListener("dragstart", drag);

  cell.dataset.tileId = tileId;
  cell.appendChild(newTile);
  countTrack();
}

// Track counting
const TRACK_TYPES = ["UD","LR","NE","NW","SE","SW","UL","UR","DL","DR","LU","LD","RU","RD","LRU","LRD","UDL","UDR"];

function countTrack() {
  const counts = { TOT: 0 };
  TRACK_TYPES.forEach(t => counts[t] = 0);

  document.querySelectorAll(".cell[data-tile-id]").forEach(cell => {
    counts.TOT++;
    counts[cell.dataset.tileId]++;
  });

  Object.entries(counts).forEach(([key, val]) => {
    const el = document.getElementById("count" + key);
    if (el) el.textContent = val;
  });
}

// Keyboard shortcuts
const KEY_MAP = {
  "1": "UD", "2": "LR", "3": "NE", "4": "SE", "5": "SW", "6": "NW",
  "7": "LRU", "8": "UDR", "9": "LRD", "0": "UDL",
  "q": "UL", "w": "UR", "e": "RU", "r": "RD", "t": "DR", "y": "DL", "u": "LD", "i": "LU"
};

document.addEventListener("keydown", e => {
  if (!currentCell || currentCell.classList.contains("nodrop")) return;
  const tileId = KEY_MAP[e.key];
  if (tileId) {
    const src = `./images/${tileId}.png`;
    placeTile(currentCell, src, tileId, currentCell.firstChild);
  }
});

// Hover tracking
document.addEventListener("DOMContentLoaded", () => {
  generateGrid();

  document.querySelectorAll(".cell").forEach(cell => {
    cell.addEventListener("mouseenter", () => { currentCell = cell; cell.classList.add("hovered"); });
    cell.addEventListener("mouseleave", () => { currentCell = null; cell.classList.remove("hovered"); });
    cell.addEventListener("contextmenu", e => e.preventDefault());
  });

  // Counter hover highlighting
  document.querySelectorAll(".countrow img").forEach(img => {
    img.addEventListener("mouseenter", () => {
      document.querySelectorAll(`[data-tile-id="${img.id}"]`).forEach(el => el.classList.add("highlight"));
    });
    img.addEventListener("mouseleave", () => {
      document.querySelectorAll(`[data-tile-id="${img.id}"]`).forEach(el => el.classList.remove("highlight"));
    });
  });

  // Tile palette drag
  document.querySelectorAll(".tilechoice").forEach(tile => {
    tile.addEventListener("dragstart", drag);
  });
});

// City highlight groups
const highlightGroups = {
  grimsby: ["london","edinburgh","belfast","amsterdam","bruges","paris","mons","cologne","copenhagen"],
  hamburg: ["amsterdam","copenhagen","berlin","cologne","gothenburg","mons","bruges","london","trondheim"],
  rotterdam: ["amsterdam","mons","bruges","cologne","london","berlin","paris","copenhagen"],
  stuttgart: ["cologne","bastei","matterhorn","prague","mons","paris","berlin","bernina"],
  dijon: ["lyon","paris","mons","matterhorn","bruges","millau","verdon","cologne"],
  bucharest: ["mostar","budapest","meteora","bernina","warsaw","prague","cappadocia","florence","matterhorn"],
  marseille: ["verdon","lyon","millau","florence","matterhorn","madrid","rome","bernina"]
};

const highlightGroupsTie = {
  grimsby: [], hamburg: [],
  rotterdam: ["lyon","edinburgh"],
  stuttgart: ["lyon","bruges"],
  dijon: ["amsterdam","bernina"],
  bucharest: [],
  marseille: ["paris","porto"]
};

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".cell").forEach(cell => {
    cell.addEventListener("mouseenter", () => {
      const group = highlightGroups[cell.id];
      const tie = highlightGroupsTie[cell.id];
      if (group) {
        group.forEach(id => document.getElementById(id)?.classList.add("highlight"));
        tie?.forEach(id => document.getElementById(id)?.classList.add("highlightTie"));
      }
    });
    cell.addEventListener("mouseleave", () => {
      const group = highlightGroups[cell.id];
      const tie = highlightGroupsTie[cell.id];
      if (group) {
        group.forEach(id => document.getElementById(id)?.classList.remove("highlight"));
        tie?.forEach(id => document.getElementById(id)?.classList.remove("highlightTie"));
      }
    });
  });
});

// Zoom & Pan
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;
const MIN_ZOOM = 0.3, MAX_ZOOM = 4;

function applyTransform() {
  const grid = document.getElementById("grid");
  grid.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}

document.addEventListener("DOMContentLoaded", () => {
  const viewport = document.getElementById("viewport");

  // Zoom with mouse wheel
  viewport.addEventListener("wheel", e => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const oldZoom = zoom;
    const zoomFactor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom * zoomFactor));

    // Adjust pan so zoom centers on cursor position
    panX = mouseX - (mouseX - panX) * (zoom / oldZoom);
    panY = mouseY - (mouseY - panY) * (zoom / oldZoom);
    applyTransform();
  }, { passive: false });

  // Pan with click-drag on empty cells
  viewport.addEventListener("mousedown", e => {
    // Only pan if clicking on an empty cell (no track tile) or on the grid background
    const cell = e.target.closest(".cell");
    if (cell && cell.dataset.tileId) return; // has a track, don't pan
    if (e.target.tagName === "IMG") return; // clicking on a tile image, don't pan

    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panStartPanX = panX;
    panStartPanY = panY;
    viewport.classList.add("panning");
    e.preventDefault();
  });

  document.addEventListener("mousemove", e => {
    if (!isPanning) return;
    panX = panStartPanX + (e.clientX - panStartX);
    panY = panStartPanY + (e.clientY - panStartY);
    applyTransform();
  });

  document.addEventListener("mouseup", () => {
    if (isPanning) {
      isPanning = false;
      document.getElementById("viewport").classList.remove("panning");
    }
  });
});

// Export/Import
document.getElementById("exportBtn").addEventListener("click", () => {
  const state = {};
  document.querySelectorAll(".cell[data-tile-id]").forEach(cell => {
    state[cell.id] = { tileId: cell.dataset.tileId };
  });

  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "grid-state.json";
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFile").click();
});

document.getElementById("importFile").addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    const state = JSON.parse(e.target.result);

    // Clear grid
    document.querySelectorAll(".cell").forEach(cell => {
      delete cell.dataset.tileId;
      if (cell.firstChild?.tagName === "IMG") cell.firstChild.remove();
    });

    // Restore state
    for (const [cellId, data] of Object.entries(state)) {
      const cell = document.getElementById(cellId);
      if (cell) {
        placeTile(cell, `./images/${data.tileId}.png`, data.tileId, null);
      }
    }
  };
  reader.readAsText(file);
});
